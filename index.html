<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal TODO</title>
    <meta name="description" content="A premium, minimalist TODO application with dark mode support and productivity keyboard shortcuts.">
    
    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    
    <!-- SEO & Meta Tags -->
    <link rel="canonical" href="https://todo.imdeepmind.com/">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#d9083c">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://todo.imdeepmind.com/">
    <meta property="og:title" content="Minimal TODO">
    <meta property="og:description" content="Organize your tasks with ease using this premium, keyboard-friendly TODO app.">
    <meta property="og:image" content="https://imdeepmind.com/todo/assets/og_todo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://todo.imdeepmind.com/">
    <meta property="twitter:title" content="Minimal TODO">
    <meta property="twitter:description" content="Organize your tasks with ease using this premium, keyboard-friendly TODO app.">
    <meta property="twitter:image" content="https://imdeepmind.com/todo/assets/og_todo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">
    <a href="https://imdeepmind.com" class="site-logo-link">
        <img src="assets/logo.png" alt="Minimal TODO Logo" class="site-logo">
    </a>
    <button id="theme-toggle" class="icon-btn theme-toggle" aria-label="Toggle dark mode">
        <!-- Sun Icon (Light Mode) -->
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon Icon (Dark Mode) -->
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <main id="app">
        <div class="list-header">
            <button id="clear-all-btn" class="clear-all-btn">Clear All</button>
        </div>
        <div id="tag-filters-container" class="tag-filters-container"></div>
        <div id="todo-list-container">
            <div id="todo-list">
                <!-- Todos will be injected here -->
            </div>
            
            <div id="empty-state" class="empty-state">
                No tasks for today.
            </div>
        </div>
    </main>

    <button id="add-btn" class="add-btn" aria-label="Add new todo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Modal for adding todo -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off">
            <div class="modal-actions">
                <button id="cancel-btn" class="text-btn">Cancel</button>
                <button id="confirm-btn" class="primary-btn">Add Task</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
